name: Release

# Publish @johnhenry/agent-query-core to npm.
#   - Tag-triggered: push a tag like v0.1.0 (must match the package version).
#   - Or run manually via workflow_dispatch (uses the version already in package.json).
# Requires the NPM_TOKEN repo secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - name: Gate (typecheck + tests + build)
        run: |
          npm run typecheck
          npm test
          npm run build
      - name: Verify tag matches package version
        if: github.ref_type == 'tag'
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "tag v$TAG_VERSION does not match package version $PKG_VERSION" >&2
            exit 1
          fi
      - name: Publish to npm
        # Prerelease versions go to the "rc" dist-tag; stable to "latest".
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          case "$PKG_VERSION" in
            *-*) DIST_TAG=rc ;;
            *)   DIST_TAG=latest ;;
          esac
          echo "publishing $PKG_VERSION with dist-tag $DIST_TAG"
          npm publish --provenance --access public --tag "$DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
